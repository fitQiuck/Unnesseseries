stages:
  - build
  - test
  - docker

variables:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  before_script:
    - apt-get update && apt-get install -y curl git
  script:
    - dotnet restore
    - dotnet build --configuration Release
  artifacts:
    paths:
      - bin/
      - obj/

test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet test --logger "trx;LogFileName=test_results.trx"
  artifacts:
    when: always
    reports:
      junit: TestResults/*.xml
    paths:
      - TestResults/

docker-build:
  stage: docker
  image: docker:26
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY/$CI_PROJECT_PATH/englishup-api:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY/$CI_PROJECT_PATH/englishup-api:$CI_COMMIT_SHA


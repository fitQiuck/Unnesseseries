    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 10s

  db:
    image: postgres:15
    container_name: englishup_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bekzod28072009
      POSTGRES_DB: englishup

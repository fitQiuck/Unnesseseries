    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: Auth.Api/Auth.Api.csproj
    container_name: englishup-api
    ports:
      - "5000:5000"
    # environment:
    #   - ConnectionStrings__DefaultConnection=Host=localhost;Port=5432;Username=postgres;Password=bekzod28072009;Database=EnglishUp;
    #   - Jwt__Issuer=EnglishUp
    #   - Jwt__Audience=EnglishUpUsers
